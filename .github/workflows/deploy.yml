name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "--- key first line ---"
          head -1 ~/.ssh/deploy_key
          echo "--- key last line ---"
          tail -1 ~/.ssh/deploy_key
          echo "--- key line count ---"
          wc -l ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "ssh-keygen check failed"
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run backend tests
        run: |
          cd backend
          npm install
          npm test

      - name: Run frontend tests
        run: |
          cd frontend
          npm install
          npm run test:run

      - name: Pull & deploy backend
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            set -e
            cd /var/www/mcc-tracker/app
            git pull origin main
            cd backend
            npm install --production
            pm2 reload mcc-api || pm2 start src/app.js --name mcc-api
            pm2 save
          ENDSSH

      - name: Build & deploy frontend
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            set -e
            cd /var/www/mcc-tracker/app/frontend
            npm install
            npm run build
          ENDSSH

      - name: Notify success
        run: echo "Deploy complete — $(date)"
