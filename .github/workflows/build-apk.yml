name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Capacitor sync
        run: |
          cd frontend
          npx cap sync android

      - name: Build debug APK
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename and upload APK
        run: |
          DATE=$(date +%y%m%d)
          COUNT=$(git rev-list --count HEAD)
          APK_NAME="${DATE}.${COUNT}.apk"
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkback-${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 30
