name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Check required files
        run: |
          test -f frontend/capacitor.config.json || (echo "ERROR: frontend/capacitor.config.json not committed" && exit 1)
          test -d frontend/dist             || (echo "ERROR: frontend/dist missing — build step failed?" && exit 1)
          test -f frontend/dist/index.html  || (echo "ERROR: frontend/dist/index.html missing" && exit 1)
          node --version | grep -E "^v(2[2-9]|[3-9][0-9])\." || (echo "ERROR: Node.js >=22 required" && exit 1)
          java -version 2>&1 | grep -E "version \"(2[1-9]|[3-9][0-9])\." || (echo "ERROR: Java >=21 required (Capacitor 8)" && exit 1)

      - name: Capacitor sync
        run: |
          cd frontend
          npx cap sync android

      - name: Build debug APK
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename and upload APK
        run: |
          DATE=$(date +%y%m%d)
          COUNT=$(git rev-list --count HEAD)
          APK_NAME="checkback-${DATE}.${COUNT}.apk"
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 30
